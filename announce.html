<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: #fffcf0;
  font-family: 'Courier New', Courier, monospace;
}

.wrap {
  width: 1200px;
  height: 630px;
  display: flex;
  position: relative;
}

/* ── LEFT: hero image ── */
.hero {
  width: 680px;
  height: 630px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: 50% 20%;
  image-rendering: pixelated;
  display: block;
}

/* right-side fade */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    transparent 40%,
    #fffcf0 100%
  );
}

/* bottom vignette */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    transparent 60%,
    rgba(255,252,240,0.3) 100%
  );
  z-index: 1;
}

/* ── RIGHT: text panel ── */
.panel {
  flex: 1;
  height: 630px;
  background: #fffcf0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 52px 0 16px;
  position: relative;
  z-index: 2;
}

.badge-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.badge {
  background: #ad8301;
  color: #fffcf0;
  font-size: 9px;
  font-weight: bold;
  letter-spacing: 2.5px;
  padding: 5px 12px;
}

.badge-outline {
  border: 1px solid #dad8ce;
  color: #6f6e69;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 5px 10px;
}

.game-name {
  font-size: 11px;
  color: #6f6e69;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.headline {
  font-size: 46px;
  font-weight: 900;
  color: #100f0f;
  line-height: 1.05;
  margin-bottom: 8px;
  font-family: Georgia, serif;
  font-style: italic;
  letter-spacing: -1px;
}

.headline em {
  color: #bc5215;
  font-style: italic;
}

.subline {
  font-size: 14px;
  color: #b7b5ac;
  letter-spacing: 1px;
  margin-bottom: 32px;
  font-family: 'Courier New', monospace;
}

/* divider */
.divider {
  width: 40px;
  height: 2px;
  background: #ad8301;
  margin-bottom: 24px;
}

/* mission text */
.mission {
  margin-bottom: 32px;
}

.mission-label {
  font-size: 9px;
  color: #bc5215;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.mission-text {
  font-size: 12px;
  color: #6f6e69;
  line-height: 2;
}

/* feature pills */
.features {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.feat {
  border: 1px solid #e6e4d9;
  color: #b7b5ac;
  font-size: 9px;
  letter-spacing: 1.5px;
  padding: 5px 10px;
  text-transform: uppercase;
}

/* CTA */
.cta {
  display: flex;
  align-items: center;
  gap: 20px;
}

.cta-btn {
  background: #ad8301;
  color: #fffcf0;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 1.5px;
  padding: 13px 28px;
  text-transform: uppercase;
}

.cta-note {
  font-size: 10px;
  color: #b7b5ac;
  letter-spacing: 1px;
  line-height: 1.8;
}
</style>
</head>
